name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # 代码质量检查和测试
  quality-check:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: ${{ runner.os }}-node-lts-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-lts-
            ${{ runner.os }}-node-

      - name: 安装依赖
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: 代码格式检查
        working-directory: app
        run: pnpm run format:check

      - name: ESLint 检查
        working-directory: app
        run: pnpm run lint:check

      - name: TypeScript 类型检查
        working-directory: app
        run: pnpm run type-check

      - name: 循环依赖检测
        working-directory: app
        run: pnpm run analyze:deps

      - name: 运行单元测试
        working-directory: app
        run: pnpm run test:run

      - name: 生成测试覆盖率报告
        working-directory: app
        run: pnpm run test:coverage

      - name: 上传测试覆盖率报告
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: app/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  # 构建检查
  build:
    name: 构建检查
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: ${{ runner.os }}-node-lts-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-lts-
            ${{ runner.os }}-node-

      - name: 安装依赖
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: 构建项目
        working-directory: app
        run: pnpm run build

      - name: 检查构建产物
        working-directory: app
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "❌ 构建失败：dist/index.html 不存在"
            exit 1
          fi
          echo "✅ 构建成功"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: app/dist/
          retention-days: 7

  # 文档生成检查
  docs:
    name: 文档生成检查
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: ${{ runner.os }}-node-lts-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-lts-
            ${{ runner.os }}-node-

      - name: 安装依赖
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: 生成 API 文档
        working-directory: app
        run: pnpm run docs

      - name: 检查文档生成
        working-directory: app
        run: |
          if [ ! -d "docs/api" ]; then
            echo "❌ 文档生成失败：docs/api 目录不存在"
            exit 1
          fi
          echo "✅ 文档生成成功"

      - name: 上传文档
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: app/docs/api/
          retention-days: 7

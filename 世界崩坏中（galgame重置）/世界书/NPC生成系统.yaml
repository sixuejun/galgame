concept_name: 动态NPC生成系统
description: >
  一个用于在故事中快速生成功能性、非同质化次要角色的框架。
  当剧情需要背景人物或功能性配角时，可参考此系统，以确保角色设定既符合世界观，
  又能在短时间内形成可用的个性化形象，避免出现模板化的路人角色。
  **以下举例仅供参考，禁止完全照抄直接出现在剧情当中**

  identity_templates:
    - template_for: 一般幸存者
      description: 普通人类幸存者，通常没有显著异能，依赖技能、经验或社交关系求生。
      fields:
        - identity: 对NPC身份的简短说明（如"逃荒商贩""沙尘流民""临时庇护所的厨师"）
        - npc_name: 符合时代和地域背景的名字
        - profession_or_status: 职业或社会地位（如"小商人""劫匪""临时搬运工""前公司职员"）
        - core_quirk: 一句话描述其核心性格或癖好（如"极度爱惜食物，甚至会舔干净包装袋"）
        - notable_detail (可选): 外貌或随身物的特征（如"总戴着一副裂了的防风镜"）

    - template_for: 具有异能的幸存者
      description: 在末世中觉醒了轻度异能的个体，异能有明确局限性，大多只能帮助生存而不能应用于战斗中，常被他人惧怕或利用。
      fields:
        - identity: 身份与异能特征简述（如"会短暂冻结液体的拾荒少女"）
        - npc_name: 符合背景的名字
        - core_quirk: 一句话描述性格或行为习惯
        - ability_description: 异能的效果、限制和副作用（如"可让植物生长速度翻倍，但会消耗自身体力"）
        - notable_detail (可选): 外貌或物品上的异能痕迹（如"指尖常覆盖细小冰霜"）

    - template_for: 怪物
      description: 世界崩坏后出现的变异生物、感染者或超自然实体，既是威胁也是环境氛围的重要组成部分。
      fields:
        - identity: 怪物种类与基本特征（如"沙尘中的多足掘地兽"）
        - npc_name: （可选，通常怪物不具备个人化名字）
        - profession: 若怪物保留人类或动物习性，可简述其原本的生态角色（如"曾是农耕牛"）
        - observed_action: 一句话描述其在场景中的动作或声音（如"静静地趴在废墟顶端，用触角探测空气"）
        - threat_level: 威胁等级（如"低""中""高"）
        - notable_detail (可选): 视觉或听觉上的标志性特征（如"身体散发类似烧焦纸张的气味"）

optional_expansions:
  - expansion: 社会关系网络
    description: 若NPC与主角或其他NPC有联系，可简单标注关系（亲属、旧友、交易对象、仇敌等）。
  - expansion: 情绪状态
    description: 给NPC附加当前情绪（如"紧张""麻木""愤怒"）以方便场景对话表现。
  - expansion: 临时目标
    description: NPC在当前场景中的短期动机（如"寻找走失的孩子""讨价还价换一袋盐"）。
  - expansion: 复杂人性
    description: 末世之下的人性复杂多变，敌人可以被感化、同伴亦可能背叛，让NPC角色也拥有丰富的人性有利于增加剧情张力。

variable_integration: >
  当生成新的重要NPC角色时，应将其添加到变量系统的"角色"字段中，使用以下模板：
  
  角色.[姓名]:
    末世前职业: ""  # 该角色在世界崩坏前的职业或身份
    与user的关系: ""  # 描述角色与<user>的关系
    羁绊值: 10  # 初始值为10，范围[0,100]
    能力: ""  # 角色所拥有的才能、天赋或者能力，允许为"无"
    状态: ""  # 角色当前的状态描述
  
  注意：
  - 只有对剧情有持续影响的NPC才需要添加到变量系统
  - 一次性出现的路人角色无需添加
  - 羁绊值初始为10，后续根据互动调整，每次变动控制在[-5, +5]范围内
